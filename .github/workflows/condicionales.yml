# This is a basic workflow to help you get started with Actions

name: Demo Condicionales

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  pipeline:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:


      # Runs a single command using the runners shell
      - name: "Step 1 - Siempre se ejecuta"
        run: echo "Step 1 OK"
      - name: "Step 2 - Forzar un fallo simulado"
        run: exit 1
      - name: "Step 3 - Forzar un fallo simulado"
        if: success()
        run: echo "Este step no se ejecutara porque el step anterior fallo "
      - name: "Step 4 - Solo si hubo fallo (sí se ejecuta"
        if: failure()
        run: echo "Fallo detectado "
      - name: "Step 5 - Siempre corre cleanup"
        if: always()
        run: echo "Limpieza final, siempre se ejecuta"
      - name: "Step 6 - solo en la rama main"
        if: github.ref_name == 'main'
        run: echo "Este step solo corre en main"

    
